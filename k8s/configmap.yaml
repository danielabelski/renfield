apiVersion: v1
kind: ConfigMap
metadata:
  name: renfield-env
  namespace: renfield
  labels:
    app.kubernetes.io/part-of: renfield
data:
  # Infra endpoints (cluster-internal DNS)
  DATABASE_URL: "postgresql+asyncpg://renfield:__PG_PASSWORD__@postgres:5432/renfield"
  REDIS_URL: "redis://redis:6379"
  OLLAMA_URL: "http://ollama:11434"
  OLLAMA_EMBED_URL: "http://ollama:11434"
  OLLAMA_VISION_URL: "http://ollama:11434"
  OLLAMA_FALLBACK_URL: ""
  # DLNA MCP runs on hostNetwork (any worker); the `dlna-mcp` Service routes to it.
  DLNA_MCP_URL: "http://dlna-mcp:9091/mcp"

  # External integrations
  HOME_ASSISTANT_URL: "http://192.168.1.80:8123"
  FRIGATE_URL: "http://frigate.local:5000"          # TODO: resolve to IP when needed
  JELLYFIN_URL: "http://192.168.1.123:8096"
  SEARXNG_API_URL: "http://searxng:8080"            # in-cluster SearXNG pod
  SEARXNG_INSTANCES: "http://searxng:8080"          # consumed by @kevinwatt/mcp-server-searxng
  N8N_API_URL: "https://n8n.home.bongard.dev/api/v1"
  # LAN-direct. The DNS name `paperless.home.bongard.dev` points at a
  # Hostpoint shared-hosting IP (Wildcard A-record leftover) and presents
  # a *.web.hostpoint.ch cert — unusable. Paperless is reachable directly
  # on the cluster subnet.
  PAPERLESS_API_URL: "http://192.168.1.162:8000"

  # OpenAI-compatible LLM endpoints (llama-server pods on the cluster).
  #   - Chat/Agent/RAG/Intent/KG/Memory → llama-server-agent (Qwen3.6-35B-A3B
  #     MoE Q4_K_XL on k8s-gpu-1 with tensor-split across both GPUs).
  #   - Embeddings → llama-server-embed (Qwen3-Embedding-4B Q4_K_M on
  #     k8s-gpu-2 CPU-only, with --embedding --pooling last).
  # Vision is currently disabled (OLLAMA_VISION_MODEL=""); a third
  # llama-server-vision pod can be added in a follow-up step.
  LLM_OPENAI_BASE_URL: "http://llama-server-agent:8080/v1"
  # LLM_OPENAI_API_KEY is sourced from the `renfield-secrets`/`llm-openai-api-key`
  # Secret in backend.yaml. llama-server accepts any non-empty value today;
  # the Secret indirection lets us swap to a real bearer (vLLM, OpenAI…)
  # without re-applying this ConfigMap.
  LLM_OPENAI_MODEL: "qwen3.6"
  LLM_OPENAI_EMBED_BASE_URL: "http://llama-server-embed:8080/v1"
  LLM_OPENAI_EMBED_MODEL: "qwen3-embedding"

  # Legacy Ollama model names kept for back-compat with config code paths
  # that read them as defaults. They're NOT used while the LLM_OPENAI_*
  # endpoints are set, except OLLAMA_VISION_MODEL which gates the vision
  # tier (empty = disabled).
  OLLAMA_MODEL: "qwen3:14b"
  OLLAMA_CHAT_MODEL: "qwen3:14b"
  OLLAMA_RAG_MODEL: "qwen3:14b"
  OLLAMA_INTENT_MODEL: "qwen3:8b"
  OLLAMA_EMBED_MODEL: "qwen3-embedding:4b"
  OLLAMA_VISION_MODEL: ""
  AGENT_MODEL: "qwen3:14b"
  EMBEDDING_DIMENSION: "2560"
  WHISPER_MODEL: "small"
  PIPER_VOICES: "de:de_DE-thorsten-high,en:en_US-amy-medium"
  PIPER_DEFAULT_VOICE: "de_DE-thorsten-high"

  # RAG
  RAG_ENABLED: "true"
  RAG_CHUNK_SIZE: "512"
  RAG_CHUNK_OVERLAP: "50"
  RAG_TOP_K: "5"
  RAG_SIMILARITY_THRESHOLD: "0.4"

  # Feature flags
  DEFAULT_LANGUAGE: "de"
  AGENT_ENABLED: "true"
  MCP_ENABLED: "true"
  MEMORY_ENABLED: "true"
  MEMORY_EXTRACTION_ENABLED: "true"
  KNOWLEDGE_GRAPH_ENABLED: "true"
  PRESENCE_ENABLED: "true"
  MEDIA_FOLLOW_ENABLED: "true"
  HA_MCP_ENABLED: "true"
  N8N_MCP_ENABLED: "true"
  EMAIL_MCP_ENABLED: "true"
  DLNA_MCP_ENABLED: "true"
  WEATHER_ENABLED: "true"
  SEARCH_ENABLED: "true"
  NEWS_ENABLED: "true"
  JELLYFIN_ENABLED: "true"
  PAPERLESS_ENABLED: "true"
  RADIO_ENABLED: "true"

  # Agent timeouts
  AGENT_STEP_TIMEOUT: "60"
  AGENT_TOTAL_TIMEOUT: "300"

  # Presentation
  ADVERTISE_HOST: "renfield.local"
  ADVERTISE_PORT: "80"

  # Satellites
  SATELLITE_LATEST_VERSION: "1.3.0"

  # Persist ML model caches (EasyOCR ~/.EasyOCR, HuggingFace ~/.cache/huggingface,
  # Torch ~/.cache/torch, whisper ~/.cache/whisper) across pod restarts by
  # pointing HOME at the /app/data mount (Longhorn PVC today; NFS-CSI RWX
  # PVC after cutover — same path, shared with the document-worker).
  HOME: "/app/data/cache-home"
  HF_HOME: "/app/data/cache-home/.cache/huggingface"

  # Mail MCP account config. Mounted into the backend pod via the
  # renfield-mcp-config ConfigMap — see k8s/backend.yaml. The `/config/`
  # default from config/mcp_servers.yaml doesn't exist in the pod;
  # override to the actual mount path.
  MAIL_ACCOUNTS_CONFIG: "/app/config/mail_accounts.yaml"

  # Logging
  LOG_LEVEL: "INFO"
  DO_NOT_TRACK: "1"
