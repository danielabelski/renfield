apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: renfield
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: renfield
spec:
  selector:
    app.kubernetes.io/name: searxng
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: renfield
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: renfield
data:
  settings.yml: |
    use_default_settings: true
    general:
      instance_name: "Renfield SearXNG"
    server:
      # Override the default of requiring a real secret
      secret_key: "changeme-renfield-searxng"
      bind_address: "0.0.0.0"
      port: 8080
      limiter: false
      image_proxy: false
    search:
      safe_search: 0
      formats:
        - html
        - json      # required: Renfield/LLM consumes JSON
    outgoing:
      request_timeout: 5.0
      max_request_timeout: 10.0
    ui:
      default_theme: simple

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: renfield
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: renfield
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/part-of: renfield
    spec:
      # Kubernetes' auto-injected service env vars would set SEARXNG_PORT=tcp://…
      # which SearXNG's entrypoint parses as a port number and dies. Suppress them.
      enableServiceLinks: false
      initContainers:
        # Copy ConfigMap settings into a writable dir; SearXNG chowns its settings file
        # on startup, which fails on the read-only ConfigMap mount.
        - name: init-settings
          image: busybox:1.36
          command: ["sh", "-c", "cp /cm/settings.yml /settings/ && chown 977:977 /settings/settings.yml"]
          volumeMounts:
            - name: settings-cm
              mountPath: /cm
            - name: settings
              mountPath: /settings
          securityContext:
            runAsUser: 0
      containers:
        - name: searxng
          image: searxng/searxng:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: "http://searxng:8080/"
            - name: INSTANCE_NAME
              value: "Renfield SearXNG"
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: settings-cm
          configMap:
            name: searxng-settings
        - name: settings
          emptyDir: {}
