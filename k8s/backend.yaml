apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: renfield
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: renfield
spec:
  selector:
    app.kubernetes.io/name: backend
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: renfield
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: renfield
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: renfield
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        # Wait for Postgres/Redis/Ollama to be reachable. Schema bootstrap is handled by the
        # backend itself on startup (init_db → Base.metadata.create_all → stamp alembic HEAD
        # for fresh installs). Incremental schema changes on an existing DB are applied via
        # k8s/alembic-upgrade-job.yaml on demand, not at pod start.
        - name: wait-for-deps
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "waiting for postgres..."
              until nc -z postgres 5432; do sleep 1; done
              echo "waiting for redis..."
              until nc -z redis 6379; do sleep 1; done
              echo "waiting for ollama..."
              until nc -z ollama 11434; do sleep 1; done
              echo "deps ready"
              # Ensure the persistent HOME exists so Python libs can create
              # their cache dirs there on first run (EasyOCR, HF, torch, whisper).
              mkdir -p /app/data/cache-home/.cache /app/data/cache-home/.EasyOCR
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: cache-home
              mountPath: /app/data/cache-home
      containers:
        - name: backend
          image: registry.treehouse.x-idra.de/renfield/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          command: ["uvicorn"]
          args: ["main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: renfield-env
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: postgresql+asyncpg://renfield:$(POSTGRES_PASSWORD)@postgres:5432/renfield
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: secret-key
            - name: DEFAULT_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: default-admin-password
            - name: HOME_ASSISTANT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: home-assistant-token
            - name: OPENWEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: openweather-api-key
            - name: NEWSAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: newsapi-key
            - name: JELLYFIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: jellyfin-api-key
            - name: JELLYFIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: jellyfin-token
            - name: JELLYFIN_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: jellyfin-base-url
            - name: JELLYFIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: jellyfin-user-id
            - name: N8N_API_KEY
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: n8n-api-key
            - name: PAPERLESS_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: paperless-api-token
            - name: MAIL_REGFISH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: renfield-secrets
                  key: mail-regfish-password
          volumeMounts:
            # Shared with the document-worker pod (#388 cutover). The API
            # writes the uploaded file here, the worker reads it from the
            # same NFS-backed PVC. Must be mounted at the same path on
            # both pods because the DB stores absolute file paths.
            - name: uploads
              mountPath: /app/data/uploads
            # Shared ML model cache (EasyOCR / HuggingFace / Docling).
            # Backend still needs it because chat_upload.py runs Docling
            # in-process; the worker reads from the same cache for the
            # async upload path.
            - name: cache-home
              mountPath: /app/data/cache-home
            # Overlay an ephemeral npm cache on top of the shared
            # cache-home. The MCP stdio servers npx-install on startup,
            # and backend + worker racing on the same .npm tree caused
            # ENOTEMPTY rename errors that made MCP 'search' and 'news'
            # fail on first connect (retries worked, just noisy). Pod-
            # local emptyDir sidesteps the race entirely.
            - name: npm-cache
              mountPath: /app/data/cache-home/.npm
            - name: mcp-config
              mountPath: /app/config/mcp_servers.yaml
              subPath: mcp_servers.yaml
              readOnly: true
            - name: mcp-config
              mountPath: /app/config/agent_roles.yaml
              subPath: agent_roles.yaml
              readOnly: true
            - name: mcp-config
              mountPath: /app/config/kg_scopes.yaml
              subPath: kg_scopes.yaml
              readOnly: true
            # Silences the "Config file not found: /config/mail_accounts.yaml"
            # WARN from renfield-mcp-mail on startup. The shipped default
            # ships `accounts: []`; override by patching this entry in the
            # renfield-mcp-config ConfigMap when real accounts are added.
            - name: mcp-config
              mountPath: /app/config/mail_accounts.yaml
              subPath: mail_accounts.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              # Docling + EasyOCR both moved to the document-worker pod
              # on the hot paths (#388 + chat_upload auto-index
              # follow-up). Backend still runs Docling inline on the
              # user-triggered /api/chat/upload/{id}/index endpoint —
              # rare, but can peak 3-4 GiB on a large PDF. 6 GiB leaves
              # room for baseline (FastAPI + Ollama client + MCP + pool)
              # plus one concurrent sync /index without OOMKill. Could
              # drop to 5 GiB once that endpoint also migrates.
              memory: 6Gi
      volumes:
        # RWX NFS PVCs shared with document-worker — see k8s/shared-pvcs.yaml.
        - name: uploads
          persistentVolumeClaim:
            claimName: renfield-uploads-shared
        - name: cache-home
          persistentVolumeClaim:
            claimName: renfield-cache-shared
        # Pod-local npm cache (see mount comment). 2Gi is generous; npm
        # + all MCP server dependencies typically land around 500 MB.
        - name: npm-cache
          emptyDir:
            sizeLimit: 2Gi
        - name: mcp-config
          configMap:
            name: renfield-mcp-config
